name: Windows Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Rust
      run: |
        rustup set profile minimal
        rustup default stable

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Build
      run: cargo build --release

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: claildesk-windows
        path: target/release/claildesk.exe
        retention-days: 5

  release:
    needs: build
    runs-on: windows-2019
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Download build
      uses: actions/download-artifact@v4
      with:
        name: claildesk-windows
        path: .
    
    - name: Create Portable ZIP
      shell: pwsh
      run: |
        Compress-Archive -Path claildesk.exe -DestinationPath ClailDesk-${{ github.ref_name }}-windows-portable.zip
        
    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ClailDesk-${{ github.ref_name }}-windows-portable.zip
        tag_name: ${{ github.ref_name }}
        name: ClailDesk ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
