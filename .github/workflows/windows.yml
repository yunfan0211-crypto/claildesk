name: Windows Build

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal
        
    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
        
    - name: Cache target directory
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build
      run: cargo build --release
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: claildesk-windows
        path: target/release/claildesk.exe

  release:
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download build
      uses: actions/download-artifact@v3
      with:
        name: claildesk-windows
        path: .
    
    - name: Create Portable ZIP
      run: |
        Compress-Archive -Path claildesk.exe -DestinationPath ClailDesk-${{ github.ref_name }}-windows-portable.zip
        
    - name: Create Installer
      run: |
        & 'C:\Program Files (x86)\NSIS\makensis.exe' setup.nsi
        
    - name: Upload Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ClailDesk-${{ github.ref_name }}-windows-portable.zip
          claildesk-${{ github.ref_name }}-windows-installer.exe
        tag_name: ${{ github.ref_name }}
        name: ClailDesk ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
